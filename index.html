<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黄金矿工（HTML5）</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brandTitle">黄金矿工</div>
        <div class="brandSubtitle">按 空格 / 回车 / 点击 放钩子</div>
        <div id="marketTicker" class="brandMarket">当日行情：等待开盘</div>
      </div>

      <div class="stats" aria-label="游戏信息">
        <div class="stat">
          <div class="label">关卡</div>
          <div id="level" class="value">1</div>
        </div>
        <div class="stat">
          <div class="label">得分</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="stat">
          <div class="label">目标</div>
          <div id="target" class="value">0</div>
        </div>
        <div class="stat">
          <div class="label">剩余</div>
          <div class="value"><span id="time">60</span><span class="unit">s</span></div>
        </div>
      </div>

      <div class="inventory" aria-label="道具库存">
        <div class="chip bomb">
          <svg class="chipIcon" aria-hidden="true"><use href="#icon-bomb" xlink:href="#icon-bomb"></use></svg>
          炸药 <span id="bombs">0</span>
        </div>
        <div class="chip speed">
          <svg class="chipIcon" aria-hidden="true"><use href="#icon-speed" xlink:href="#icon-speed"></use></svg>
          加速 <span id="speedTokens">0</span>
        </div>
        <div class="chip lucky">
          <svg class="chipIcon" aria-hidden="true"><use href="#icon-lucky" xlink:href="#icon-lucky"></use></svg>
          幸运袋 <span id="luckyTokens">0</span>
        </div>
      </div>

      <div class="controls" aria-label="游戏控制">
        <button id="startBtn" class="btn primary" type="button">开始</button>
        <button id="pauseBtn" class="btn" type="button" disabled>暂停</button>
        <button id="restartBtn" class="btn" type="button" disabled>重开</button>
        <button id="bombBtn" class="btn warning" type="button" disabled>炸药 (X)</button>
        <button id="soundBtn" class="btn" type="button">音效: 开</button>
        <button id="musicBtn" class="btn" type="button">音乐: 开</button>
      </div>
    </header>

    <main class="stage">
      <div class="canvasWrap" role="application" aria-label="黄金矿工游戏画面">
        <canvas id="gameCanvas"></canvas>

        <div id="overlay" class="overlay" aria-live="polite">
          <div class="panel">
            <h1 id="overlayTitle" class="panelTitle">黄金矿工</h1>
            <p id="overlayText" class="panelText">
              抓到黄金得分，重量越大拉回越慢。倒计时结束前达到目标分数即可过关。
            </p>
            <div class="panelActions">
              <button id="overlayPrimaryBtn" class="btn primary" type="button">
                开始游戏
              </button>
              <button id="overlaySecondaryBtn" class="btn" type="button">继续</button>
            </div>

            <div id="shopPanel" class="shop hidden" aria-live="polite">
              <div class="shopIntro">购买道具（消耗当前分数），效果作用于下一关。</div>
              <div id="shopList" class="shopList"></div>
              <div class="shopFoot">
                <div id="shopSeed" class="shopSeed"></div>
                <div class="shopHint">提示：按 X 使用炸药</div>
              </div>
            </div>

            <p class="panelHint">
              操作：放钩子 <span class="kbd">空格</span> / 点击（双人：玩家2 <span class="kbd">回车</span>）；<span class="kbd">P</span>：暂停/继续；
              <span class="kbd">X</span>：炸药；<span class="kbd">M</span>：音乐；<span class="kbd">S</span>：音效；<span class="kbd">N</span>：换曲
            </p>
          </div>
        </div>
      </div>
    </main>

    <script src="./audio.js"></script>
    <script type="module" src="./src/main.js"></script>

    <!-- Inline icon set -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      style="position: absolute; width: 0; height: 0; overflow: hidden"
      aria-hidden="true"
      focusable="false"
    >
      <symbol id="icon-bomb" viewBox="0 0 24 24">
        <path
          d="M13.8 4.4c.2-.4.7-.6 1.1-.4l.8.4c.4.2.6.7.4 1.1l-.5 1 1.6 1.6 1-1.2c.3-.3.8-.4 1.2-.1l.7.5c.4.3.4.9.1 1.2l-1.2 1.4c.7.9 1.2 2 1.2 3.3 0 3.1-2.7 5.8-6.2 6.2-4.2.5-8-2.6-8-6.8 0-2.4 1.2-4.5 3.1-5.7l-.6-1.2c-.2-.4 0-.9.4-1.1l.8-.4c.4-.2.9 0 1.1.4l.6 1.1c.7-.2 1.4-.3 2.1-.3.7 0 1.4.1 2 .3l.7-1.3Z"
          fill="currentColor"
        />
        <path d="M18.5 5.2l2.2-2.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path
          d="M21.8 4.9c0 1-1 2-2 2 0-1 1-2 2-2Z"
          fill="currentColor"
          opacity="0.9"
        />
      </symbol>

      <symbol id="icon-speed" viewBox="0 0 24 24">
        <path
          d="M13 2 3 14h8l-1 8 11-14h-8l0-6Z"
          fill="currentColor"
        />
      </symbol>

      <symbol id="icon-lucky" viewBox="0 0 24 24">
        <path
          d="M12 5c-1.5-2.5-5.4-2.2-6.5.6-1.1 2.8 1.1 5.7 4.2 6.3-2.1.8-3.7 2.1-4.2 3.7C4.4 18.8 6.8 21 10 19.8c.9-.3 1.6-.8 2-1.4.4.6 1.1 1.1 2 1.4 3.2 1.2 5.6-1 4.5-4.2-.5-1.6-2.1-2.9-4.2-3.7 3.1-.6 5.3-3.5 4.2-6.3C17.4 2.8 13.5 2.5 12 5Z"
          fill="currentColor"
        />
      </symbol>
    </svg>
  </body>
</html>
